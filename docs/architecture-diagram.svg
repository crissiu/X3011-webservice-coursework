<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Urban Climate API System Architecture</title>
  <desc id="desc">Architecture diagram showing client requests, FastAPI routers, API key authentication, OpenWeatherMap integration, SQLAlchemy ORM, SQLite database, and Render deployment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #102033; }
      .subtitle { font: 400 15px Georgia, 'Times New Roman', serif; fill: #475569; }
      .box-title { font: 700 17px Georgia, 'Times New Roman', serif; fill: #0f172a; }
      .box-text { font: 400 13px Georgia, 'Times New Roman', serif; fill: #334155; }
      .label { font: 600 12px Georgia, 'Times New Roman', serif; fill: #475569; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect width="1180" height="720" fill="#f8fafc"/>
  <circle cx="100" cy="90" r="76" fill="#dbeafe" opacity="0.75"/>
  <circle cx="1080" cy="620" r="96" fill="#dcfce7" opacity="0.65"/>
  <circle cx="960" cy="90" r="68" fill="#fef3c7" opacity="0.65"/>

  <text x="60" y="54" class="title">Urban Climate and Air Quality Analytics API</text>
  <text x="60" y="82" class="subtitle">FastAPI service integrating live OpenWeatherMap data with CRUD, analytics, security, and deployment</text>

  <rect x="60" y="150" width="210" height="92" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="84" y="184" class="box-title">Client / Examiner</text>
  <text x="84" y="208" class="box-text">Swagger UI, browser, curl</text>

  <rect x="60" y="520" width="210" height="92" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="84" y="554" class="box-title">Render Deployment</text>
  <text x="84" y="578" class="box-text">Public /docs endpoint</text>

  <rect x="380" y="145" width="250" height="104" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="414" y="182" class="box-title">FastAPI Application</text>
  <text x="414" y="207" class="box-text">OpenAPI docs, validation</text>

  <rect x="378" y="300" width="254" height="96" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="408" y="333" class="box-title">API Routers</text>
  <text x="408" y="358" class="box-text">stations, observations,</text>
  <text x="408" y="378" class="box-text">analytics, imports, utility</text>

  <rect x="378" y="500" width="254" height="92" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="408" y="534" class="box-title">SQLAlchemy ORM</text>
  <text x="408" y="558" class="box-text">Database abstraction layer</text>

  <rect x="755" y="148" width="260" height="92" rx="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="182" class="box-title">API Key Authentication</text>
  <text x="790" y="206" class="box-text">X-API-Key for protected</text>
  <text x="790" y="226" class="box-text">manual write operations</text>

  <rect x="755" y="300" width="260" height="112" rx="18" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="334" class="box-title">OpenWeatherMap Service</text>
  <text x="790" y="359" class="box-text">Geocoding API</text>
  <text x="790" y="379" class="box-text">Current Weather API</text>
  <text x="790" y="399" class="box-text">Air Pollution API</text>

  <rect x="755" y="510" width="260" height="104" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="544" class="box-title">SQLite Database</text>
  <text x="790" y="569" class="box-text">Station table</text>
  <text x="790" y="589" class="box-text">Observation table</text>

  <rect x="850" y="38" width="240" height="72" rx="18" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="884" y="72" class="box-title">External Data Source</text>
  <text x="884" y="94" class="box-text">OpenWeatherMap APIs</text>

  <path class="line" d="M 270 196 C 316 196, 330 196, 380 196"/>
  <text x="292" y="181" class="label">HTTP requests</text>

  <path class="line" d="M 270 566 C 322 542, 336 245, 380 210"/>
  <text x="256" y="438" class="label">deployed URL</text>

  <path class="soft-line" d="M 630 196 C 674 196, 706 196, 755 196"/>
  <text x="654" y="181" class="label">protected writes</text>

  <path class="line" d="M 505 249 L 505 300"/>
  <text x="520" y="279" class="label">routes request</text>

  <path class="line" d="M 632 348 C 680 348, 700 356, 755 356"/>
  <text x="657" y="337" class="label">live import</text>

  <path class="line" d="M 885 300 C 895 232, 913 132, 950 110"/>
  <text x="920" y="235" class="label">API calls</text>

  <path class="line" d="M 505 396 L 505 500"/>
  <text x="520" y="456" class="label">CRUD / analytics</text>

  <path class="line" d="M 755 385 C 688 424, 663 505, 632 535"/>
  <text x="672" y="483" class="label">normalised data</text>

  <path class="line" d="M 632 546 C 680 546, 700 562, 755 562"/>
  <text x="660" y="535" class="label">SQL</text>

  <rect x="388" y="635" width="420" height="42" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="410" y="661" class="box-text">Live and demo observations share the same analytics pipeline</text>
</svg>
