services:
  - type: web
    name: x3011-urban-climate-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
